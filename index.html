<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO de base -->
    <title>Forever — Boutique de vêtements en ligne</title>
    <meta name="description" content="Forever, votre boutique de vêtements en ligne. Découvrez nos collections pour hommes, femmes et enfants. Livraison rapide et retours gratuits sous 7 jours." />
    <meta name="keywords" content="vêtements, mode, boutique en ligne, homme, femme, enfant, forever, t-shirt, collection, best seller" />
    <meta name="author" content="Forever" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph — partage Facebook, WhatsApp, LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Forever" />
    <meta property="og:title" content="Forever — Boutique de vêtements en ligne" />
    <meta property="og:description" content="Découvrez les dernières collections Forever. Mode tendance pour toute la famille. Livraison rapide et retours gratuits." />
    <meta property="og:url" content="https://www.forever.com" />
    <meta property="og:image" content="https://www.forever.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card — partage Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@forever" />
    <meta name="twitter:title" content="Forever — Boutique de vêtements en ligne" />
    <meta name="twitter:description" content="Découvrez les dernières collections Forever. Mode tendance pour toute la famille." />
    <meta name="twitter:image" content="https://www.forever.com/og-image.jpg" />

    <!-- Canonical — évite le contenu dupliqué -->
    <link rel="canonical" href="https://www.forever.com" />

    <!-- Préconnexion aux services externes pour de meilleures performances -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://js.stripe.com" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
